    <use href="#chev" x="320" y="200"/>
    <use href="#arr"  x="360" y="240"/>
    <use href="#chev" x="520" y="200"/>
    <use href="#arr"  x="600" y="320"/>
    <use href="#chev" x="160" y="280"/>
    <use href="#chev" x="600" y="360"/>
    <use href="#arr"  x="640" y="360"/>
  </g>

  <g style="color:#0A2540">
    <use href="#chev" x="200" y="0"/>
    <use href="#arr"  x="480" y="0"/>
