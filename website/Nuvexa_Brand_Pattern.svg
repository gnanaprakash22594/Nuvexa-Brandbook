    <rect x="520" y="200" width="40" height="40"/>
    <rect x="520" y="240" width="40" height="40"/>
    <rect x="160" y="280" width="40" height="40"/>
    <rect x="160" y="320" width="40" height="40"/>
    <rect x="320" y="320" width="40" height="40"/>
    <rect x="360" y="320" width="40" height="40"/>
    <rect x="440" y="280" width="40" height="40"/>
