  <g style="color:#0A2540" opacity="0.30">
    <use href="#chevthin" x="280" y="40"/>
    <use href="#chevthin" x="160" y="160"/>
    <use href="#arrthin"  x="440" y="160"/>
    <use href="#chevthin" x="280" y="280"/>
    <use href="#chevthin" x="120" y="320"/>
    <use href="#arrthin"  x="560" y="40"/>
    <use href="#chevthin" x="0"   y="80"/>
    <use href="#arrthin"  x="640" y="160"/>
    <use href="#chevthin" x="360" y="0"/>
    <use href="#chevthin" x="200" y="240"/>
    <use href="#arrthin"  x="480" y="120"/>
