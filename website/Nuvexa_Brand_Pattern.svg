    <rect x="200" y="80"  width="40" height="40"/>
    <rect x="360" y="80"  width="40" height="40"/>
    <rect x="360" y="120" width="40" height="40"/>
    <rect x="400" y="120" width="40" height="40"/>
    <rect x="600" y="40"  width="40" height="40"/>
    <rect x="600" y="80"  width="40" height="40"/>
    <rect x="480" y="40"  width="40" height="40"/>
    <rect x="240" y="120" width="40" height="40"/>
    <rect x="0"   y="160" width="40" height="40"/>
    <rect x="40"  y="160" width="40" height="40"/>
    <rect x="80"  y="160" width="40" height="40"/>
    <rect x="80"  y="200" width="40" height="40"/>
