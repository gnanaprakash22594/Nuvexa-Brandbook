<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" role="img">
  <title>Nuvexa Brand Pattern — Assembled Grid</title>
  <desc>A modular geometric pattern abstracting a campus master plan: deep navy plot clusters, prestige gold accents, campus teal secondary marks, and two builder terracotta focal points on a campus cream canvas. Inscribed chevrons and upward-right arrows reference the logo motifs.</desc>

  <defs>
    <symbol id="chev" viewBox="0 0 40 40">
      <path d="M14 12 L 24 20 L 14 28" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"/>
    </symbol>
    <symbol id="arr" viewBox="0 0 40 40">
      <path d="M14 26 L 26 14 M 18 14 L 26 14 L 26 22" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"/>
    </symbol>
    <symbol id="chevthin" viewBox="0 0 40 40">
      <path d="M16 14 L 24 20 L 16 26" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"/>
    </symbol>
    <symbol id="arrthin" viewBox="0 0 40 40">
      <path d="M15 25 L 25 15 M 19 15 L 25 15 L 25 21" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" stroke="currentColor"/>
    </symbol>
  </defs>

  <rect width="680" height="400" fill="#F4F4F0"/>

  <g fill="#0A2540">
    <rect x="80"  y="0"   width="40" height="40"/>
    <rect x="120" y="0"   width="40" height="40"/>
